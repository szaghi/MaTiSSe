---
theme:
  palette:
    dark:   '#191959'
    mid:    '#262686'
    base:   '#3333B3'
    text:   'rgb(102,102,102)'

  lists:
    ordered:
      margin-top: '0.5em'
    ordered-items:
      content: 'counter(item)'
      color: 'white'
      background: '$mid'
      padding-left: '1%'
      border-radius: '1em'
    unordered-items:
      color: '$base'
      content: "'\\2688'"

  layout:
    content:
      background: 'white'
      color: '$text'
      padding: '1%'
    header-1:
      height: '8%'
      padding: '1%'
      background: '$base'
      color: 'white'
      metadata:
        slidetitle:
          font-size: '180%'
    footer-1:
      height: '6%'
      background: '$base'
      padding: '0'
      color: 'white'
      metadata:
        authors_short:
          float: 'left'
          height: '100%'
          padding: '1% 1%'
          background: '$dark'
        affiliations_short:
          float: 'left'
          height: '100%'
          padding: '1% 1%'
          background: '$dark'
        title:
          float: 'left'
          font-size: '80%'
          height: '100%'
          padding: '1% 1%'
          background: '$mid'
        conference:
          float: 'left'
          font-size: '80%'
          height: '100%'
          width: '30%'
          padding: '1% 1%'
          background: '$base'
        total_slides_number:
          float: 'right'
          padding: '1% 1%'
        custom-3:
          value: ' / '
          float: 'right'
          padding: '1% 0%'
        slidenumber:
          float: 'right'
          padding: '1% 1%'
---
