---
theme:
  palette:
    dark:   '#191959'
    mid:    '#262686'
    base:   '#3333B2'
    light:  '#E9E9F3'
    text:   'rgb(102,102,102)'

  lists:
    ordered:
      margin-top: '0.5em'
    ordered-items:
      content: 'counter(item)'
      color: 'white'
      background: '$base'
      padding-left: '1%'
    unordered-items:
      color: '$base'
      content: "'\\25A0'"

  layout:
    content:
      background: 'white'
      color: '$text'
      padding: '1%'
    header-1:
      height: '4%'
      background: '$dark'
      color: 'white'
      padding: '0.5% 2%'
      metadata:
        toc:
          depth: '1'
    header-2:
      height: '4%'
      background: '$mid'
      color: 'white'
      padding: '0.5% 2%'
      metadata:
        subsectiontitle:
          font-size: '100%'
          padding: '0 1%'
    header-3:
      height: '6%'
      background: '$base'
      color: 'white'
      padding: '0.5% 2%'
      metadata:
        slidetitle:
          font-size: '150%'
          padding: '0 1%'
    footer-1:
      height: '4%'
      background: '$mid'
      color: 'white'
      padding: '0.5% 5%'
      metadata:
        authors:
          float: 'left'
          font-size: '100%'
          padding: '0 1%'
        affiliations:
          float: 'right'
          font-size: '100%'
    footer-2:
      height: '4%'
      background: '$dark'
      color: 'white'
      padding: '0.5% 5%'
      metadata:
        title:
          font-size: '100%'
          padding: '0 1%'

  entities:
    note:
      display: 'inline-block'
      margin: '1%'
      caption:
        padding: '0 1em'
        width: '100%'
        color: 'white'
        background: '$mid'
        display: 'inline-block'
        font-size: '120%'
      content:
        padding: '0 1em'
        font-size: '120%'
        background: '$light'
---
