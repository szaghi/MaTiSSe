---
theme:
  palette:
    dark:   '#262686'
    base:   '#3333B2'
    light:  '#E9E9F3'
    text:   'rgb(102,102,102)'

  lists:
    ordered:
      margin-top: '0.5em'
    ordered-items:
      content: 'counter(item)'
      color: 'white'
      background: '$dark'
      padding-left: '1%'
    unordered-items:
      color: '$dark'
      content: "'\\25A0'"

  layout:
    content:
      background: 'white'
      color: '$text'
      padding: '1%'
    header-1:
      height: '10%'
      background: '$base'
      color: 'white'
      padding: '0'
      metadata:
        custom-1:
          value: '.'
          float: 'left'
          height: '100%'
          width: '20%'
          color: '$dark'
          background: '$dark'
        slidetitle:
          float: 'left'
          padding: '1% 2%'
          font-size: '190%'
    footer-1:
      active: 'no'
    sidebar-1:
      position: 'L'
      width: '20%'
      padding: '1% 2%'
      background: '$base'
      color: 'white'
      border-radius: '0'
      metadata:
        title:
          font-weight: 'bold'
          font-variant: 'small-caps'
          font-size: '105%'
          display: 'inline-block'
        authors:
          font-variant: 'small-caps'
          font-size: '90%'
          display: 'inline-block'
        affiliations:
          margin-top: '4%'
          margin-bottom: '10%'
          font-variant: 'small-caps'
          font-size: '80%'
          white-space: 'pre-wrap'
          display: 'inline-block'
        toc:
          depth: '1'

  entities:
    note:
      display: 'inline-block'
      margin: '1%'
      caption:
        padding: '0 1em'
        width: '100%'
        color: 'white'
        background: '$dark'
        display: 'inline-block'
        font-size: '120%'
      content:
        padding: '0 1em'
        font-size: '120%'
        background: '$light'
---
