---
# Solarized Dark theme for MaTiSSe
#
# Palette (Ethan Schoonover's Solarized):
#   base03  #002b36  darkest background
#   base02  #073642  dark background highlights
#   base01  #586e75  secondary content / comments
#   base0   #839496  body text (normal)
#   base1   #93a1a1  secondary content (light)
#   base2   #eee8d5  background highlights (light mode)
#   yellow  #b58900  / #af8700
#   orange  #cb4b16  / #d75f00
#   green   #859900
#   blue    #268bd2
#   cyan    #2aa198
#
# Structure: beamer-berkely skeleton (left sidebar + top header + bottom footer)
#
theme:
  palette:
    base03:  '#002b36'
    base02:  '#073642'
    base01:  '#586e75'
    base0:   '#839496'
    base1:   '#93a1a1'
    base2:   '#eee8d5'
    yellow:  '#af8700'
    orange:  '#d75f00'
    green:   '#859900'
    blue:    '#268bd2'
    cyan:    '#2aa198'

  canvas:
    background: 'radial-gradient(rgb(88, 110, 117), rgb(0, 43, 54))'

  lists:
    ordered-items:
      content: 'counter(item)'
      color: '$orange'
      padding-left: '1%'
    unordered-items:
      color: '$green'
      content: "'\\25A0'"

  toc:
    display: 'inline-block'
    font-size: '90%'
    font-variant: 'small-caps'
    color: '$base0'
    section-emph:
      border: '1px solid $green'
      border-radius: '5px'
      font-weight: 'bold'
      color: '$green'
    subsection-emph:
      border: '1px solid $orange'
      border-radius: '5px'
      color: '$orange'

  layout:
    slide:
      transition: 'horizontal'
      width: '900px'
      height: '700px'
      font-size: '120%'
      data-offset: '20'
      border-style: 'solid'
      border-width: '1px'
      border-color: '$base01'
      border-radius: '10px'
    content:
      background: '$base02'
      color: '$base2'
      padding: '2%'
    header-1:
      height: '10%'
      background: '$base03'
      color: '$base0'
      padding: '0'
      metadata:
        custom-1:
          value: '.'
          float: 'left'
          height: '100%'
          width: '20%'
          color: '$base03'
          background: '$base03'
        slidetitle:
          float: 'left'
          padding: '1% 2%'
          font-size: '190%'
          color: '$green'
          font-variant: 'small-caps'
    footer-1:
      background: '$base03'
      border-radius: '0 0 10px 0'
      height: '6%'
      padding: '0.5% 0%'
      color: '$yellow'
      metadata:
        sectiontitle:
          padding: '0% 1% 2% 1%'
          font-size: '110%'
          float: 'left'
          font-variant: 'small-caps'
          color: '$base0'
        custom-1:
          value: ' | '
          float: 'left'
          padding: '0.5%'
          color: '$base01'
        subsectiontitle:
          padding: '0% 1% 2% 1%'
          font-size: '110%'
          float: 'left'
          font-variant: 'small-caps'
          color: '$green'
        total_slides_number:
          float: 'right'
          padding: '0 1%'
          color: '$orange'
        custom-2:
          value: ' of '
          float: 'right'
          color: '$base0'
        slidenumber:
          float: 'right'
          padding: '0 1%'
          color: '$base2'
        custom-3:
          value: 'slide '
          float: 'right'
          color: '$green'
    sidebar-1:
      position: 'L'
      width: '20%'
      padding: '1% 2%'
      background: '$base03'
      color: '$base0'
      border-radius: '10px 0 0 0'
      metadata:
        title:
          font-weight: 'bold'
          font-variant: 'small-caps'
          font-size: '105%'
          display: 'inline-block'
          color: '$blue'
        authors:
          font-variant: 'small-caps'
          font-size: '90%'
          display: 'inline-block'
          color: '$base1'
        affiliations:
          margin-top: '4%'
          margin-bottom: '10%'
          font-variant: 'small-caps'
          font-size: '80%'
          white-space: 'pre-wrap'
          display: 'inline-block'
          color: '$base01'
        toc:
          depth: '1'

  entities:
    box:
      display: 'inline-block'
      font-variant: 'small-caps'
      border-radius: '10px'
      caption:
        padding: '0 2%'
        color: '$green'
        border-bottom: '1px solid $green'
        display: 'inline-block'
      content:
        padding: '0 2%'
        font-size: '120%'
        color: '$base2'
    note:
      display: 'inline-block'
      padding: '0% 1%'
      margin: '0.2% 0%'
      caption:
        padding: '0 1em'
        width: '100%'
        color: '$base2'
        background: '$base02'
        display: 'inline-block'
        font-size: '120%'
        border-bottom: '1px solid $orange'
      content:
        padding: '0 1em'
        font-size: '120%'
        background: '$base03'
        color: '$base2'
    table:
      display: 'inline-block'
      margin: '2% 0%'
      caption:
        padding: '2% 0%'
        color: '$orange'
        font-size: '120%'
        display: 'inline-block'
      content:
        padding: '2% 0%'
    figure:
      font-variant: 'small-caps'
      text-align: 'center'
      caption:
        font-size: '80%'
        color: '$green'
      content:
        padding: '1% 5%'
---
