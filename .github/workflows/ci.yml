name: CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.2.2
    - uses: actions/setup-python@v5.6.0
      with:
        python-version: "3.12"
    - name: Install ruff
      run: pip install ruff
    - name: Lint
      run: ruff check matisse/ tests/
    - name: Format check
      run: ruff format --check matisse/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.2.2
    - uses: actions/setup-python@v5.6.0
      with:
        python-version: "3.12"
    - name: Install package + test deps
      run: pip install -e ".[dev]"
    - name: Run pytest with coverage
      run: python -m pytest --cov=matisse --cov-report=xml --cov-report=term-missing
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 7

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package
      run: pip install -e .

    - name: Smoke-test CLI (Linux / macOS)
      if: startsWith(runner.os, 'Linux') || startsWith(runner.os, 'macOS')
      run: |
        python --version
        MaTiSSe.py --help
        MaTiSSe.py --print-themes

    - name: Smoke-test CLI (Windows)
      if: startsWith(runner.os, 'Windows')
      run: |
        python --version
        python -m matisse --help

  publish:
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      id-token: write   # required for OIDC Trusted Publisher
    steps:
    - uses: actions/checkout@v4.2.2
    - uses: actions/setup-python@v5.6.0
      with:
        python-version: "3.12"
    - name: Build distribution
      run: |
        pip install build
        python -m build
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
